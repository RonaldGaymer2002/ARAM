name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

env:
  AWS_DEFAULT_REGION: us-east-1
  NODE_VERSION: "22"
  ENVIRONMENT: prod
  STACK_NAME: FundaresStack-Prod

# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ─── 1. Detect changes ──────────────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      services:    ${{ steps.filter.outputs.services }}
      infra:       ${{ steps.filter.outputs.infra }}
      infra_drift: ${{ steps.drift.outputs.drift }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            infra:
              - 'infra/**'
            services:
              - 'apps/**'
              - 'packages/**'

      - name: Install workspace deps (drift check)
        if: github.event_name != 'pull_request'
        run: npm ci

      - name: Install infra deps (drift check)
        if: github.event_name != 'pull_request'
        run: npm ci
        working-directory: infra

      - uses: aws-actions/configure-aws-credentials@v4
        if: github.event_name != 'pull_request'
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: CDK drift check
        id: drift
        if: github.event_name != 'pull_request'
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null \
            || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Stack not found — first deploy."
            echo "drift=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DIFF=$(cd infra && npx cdk diff ${{ env.STACK_NAME }} \
            -c environment=${{ env.ENVIRONMENT }} 2>&1 || true)

          if echo "$DIFF" | grep -qE '\[\+\]|\[-\]|\[~\]'; then
            echo "drift=true"  >> "$GITHUB_OUTPUT"
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set drift=false (PR)
        if: github.event_name == 'pull_request'
        run: echo "drift=false" >> "$GITHUB_OUTPUT"

  # ─── 2. Validate — PRs only ─────────────────────────────────────────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: apps/identification

      - name: Type-check app
        run: npx tsc --noEmit
        working-directory: apps/identification

      - name: Install infra deps
        run: npm ci
        working-directory: infra

      - name: Type-check infra
        run: npx tsc --noEmit
        working-directory: infra

  # ─── 3. Deploy infrastructure ───────────────────────────────────────────────
  deploy-infra:
    name: Deploy infra
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name != 'pull_request' && (
        needs.changes.outputs.infra      == 'true' ||
        needs.changes.outputs.infra_drift == 'true' ||
        github.event_name == 'workflow_dispatch'
      )
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Install infra deps
        run: npm ci
        working-directory: infra

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Create or update app secret in Secrets Manager
        env:
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          LOG_LEVEL:    ${{ secrets.LOG_LEVEL }}
        run: |
          SECRET_NAME="fundares/prod/app"
          SECRET_JSON=$(jq -n \
            --arg cors "$CORS_ORIGINS" \
            --arg log  "$LOG_LEVEL" \
            '{CORS_ORIGINS:$cors,LOG_LEVEL:$log}')

          if aws secretsmanager describe-secret --secret-id "$SECRET_NAME" &>/dev/null; then
            aws secretsmanager put-secret-value \
              --secret-id "$SECRET_NAME" \
              --secret-string "$SECRET_JSON"
            echo "✅ Secret updated: $SECRET_NAME"
          else
            aws secretsmanager create-secret \
              --name "$SECRET_NAME" \
              --description "Runtime configuration for decouple-services Lambda" \
              --secret-string "$SECRET_JSON"
            echo "✅ Secret created: $SECRET_NAME"
          fi

      - name: Ensure shared stack is deployed
        working-directory: infra
        env:
          AWS_ACCOUNT_ID: ${{ secrets.aws_account }}
        run: |
          STATUS=$(aws cloudformation describe-stacks \
            --stack-name FundaresSharedStack \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null \
            || echo "DOES_NOT_EXIST")

          if [[ "$STATUS" == "DOES_NOT_EXIST" ]]; then
            echo "Shared stack missing — deploying..."
            npx cdk deploy FundaresSharedStack --require-approval never
          elif [[ "$STATUS" == *ROLLBACK* || "$STATUS" == *FAILED* ]]; then
            echo "❌ Shared stack in '$STATUS' — manual intervention required."
            exit 1
          else
            echo "✅ Shared stack exists ($STATUS)."
          fi

      - name: CDK deploy
        working-directory: infra
        env:
          AWS_ACCOUNT_ID: ${{ secrets.aws_account }}
        run: |
          npx cdk deploy ${{ env.STACK_NAME }} \
            -c environment=${{ env.ENVIRONMENT }} \
            --require-approval never

  # ─── 4. Deploy Lambda code ──────────────────────────────────────────────────
  deploy-lambda:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: [changes, deploy-infra]
    if: |
      always() &&
      github.event_name != 'pull_request' && (
        needs.changes.outputs.services == 'true' ||
        github.event_name == 'workflow_dispatch'
      ) &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Lint
        run: npm run lint
        working-directory: apps/identification

      - name: Build Lambda
        run: npm run build:lambda:prod
        working-directory: apps/identification

      - name: Package Lambda artifact
        run: cd apps/identification/dist && zip ../../../deploy.zip index.js

      - name: Report artifact size
        run: |
          SIZE_BYTES=$(stat -c%s deploy.zip)
          SIZE_KB=$(echo "scale=2; $SIZE_BYTES / 1024" | bc)
          SIZE_MB=$(echo "scale=4; $SIZE_BYTES / 1048576" | bc)
          echo "deploy.zip → ${SIZE_BYTES} bytes (${SIZE_KB} KB / ${SIZE_MB} MB)"

      - name: Deploy to AWS Lambda
        run: |
          FUNCTION_NAME="fundares-prod-function"
          RETRY_COUNT=5
          RETRY_INTERVAL=10

          for i in $(seq 1 $RETRY_COUNT); do
            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file fileb://deploy.zip && break
            if [ "$i" -eq "$RETRY_COUNT" ]; then
              echo "❌ Max retries reached."
              exit 1
            fi
            echo "Retrying in ${RETRY_INTERVAL}s... (attempt $i/$RETRY_COUNT)"
            sleep $RETRY_INTERVAL
          done

          echo "✅ Lambda code updated: $FUNCTION_NAME"

  # ─── 5. Post-deploy health check ────────────────────────────────────────────
  health:
    name: Health check
    runs-on: ubuntu-latest
    needs: [deploy-infra, deploy-lambda]
    if: |
      always() && !cancelled() &&
      (needs.deploy-infra.result == 'success' || needs.deploy-lambda.result == 'success')
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Get API endpoint
        id: endpoint
        run: |
          URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "🚀 API endpoint: $URL"

      - name: Wait for Lambda cold-start
        run: sleep 5

      - name: GET /
        run: |
          URL="${{ steps.endpoint.outputs.url }}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
            echo "Attempt $i → HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "✅ Root healthy." && exit 0
            sleep 10
          done
          echo "❌ Root endpoint unreachable." && exit 1

      - name: GET /api/v1/health
        run: |
          URL="${{ steps.endpoint.outputs.url }}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/v1/health")
            echo "Attempt $i → HTTP $STATUS"
            [[ "$STATUS" == "200" ]] && echo "✅ Health endpoint healthy." && exit 0
            sleep 10
          done
          echo "❌ Health endpoint unreachable." && exit 1

  # ─── 6. Tag & GitHub Release ────────────────────────────────────────────────
  tag-release:
    name: Tag & Release
    runs-on: ubuntu-latest
    needs: health
    if: needs.health.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            LAST=$(git tag -l 'v*' --sort=-version:refname | head -1)
            if [[ -z "$LAST" ]]; then
              TAG="v1.0.0"
            else
              MAJOR=$(echo "$LAST" | sed 's/^v//' | cut -d. -f1)
              MINOR=$(echo "$LAST" | cut -d. -f2)
              TAG="v${MAJOR}.$((MINOR + 1)).0"
            fi
            git tag "$TAG" && git push origin "$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git tag -l 'v*' --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [[ -z "$PREV" ]]; then
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -30)
          else
            LOG=$(git log "${PREV}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          fi
          { echo "log<<EOF"; echo "$LOG"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "## Changes
          ${{ steps.changelog.outputs.log }}

          ## Infrastructure
          - Stack: \`${{ env.STACK_NAME }}\`
          - Account: \`682079544132\` · Region: \`us-east-1\`
          - Commit: \`${{ github.sha }}\`"
